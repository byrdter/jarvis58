          - code [ref=e284]:
            - generic [ref=e285]: "> I'm new to this codebase. Can you explain it to me?"
            - text: "⏺ I'll analyze the Excalidraw codebase structure and provide a high-level overview. ⏺ Analyze(what: \"Excalidraw codebase structure and provide a high-level overview of what it is, its main components, and how they're organized. Focus on understanding the project's purpose, architecture, and key features.\") Excalidraw is an open-source virtual whiteboard application with a hand-drawn style. It's designed for creating diagrams, wireframes, and collaborative drawings. ## Purpose - Web-based drawing tool with infinite canvas - Hand-drawn aesthetic with support for shapes, arrows, text - End-to-end encrypted collaboration - Works offline as a PWA (Progressive Web App) ## Architecture The project is organized as a monorepo with these main components: 1. Core Package (packages/excalidraw) - React component library for embedding Excalidraw in any application - Handles drawing, rendering, and core functionality - Uses roughjs for the hand-drawn style - Includes export capabilities (PNG, SVG) 2. Web Application (excalidraw-app/) - Full-featured web app at excalidraw.com - Built on top of the core package - Adds collaboration features, local storage, sharing 3. Support Packages - common - Shared utilities and constants - element - Element manipulation and type definitions - math - Mathematical functions for drawing - utils - General utility functions 4. Examples - Integration examples (Next.js, browser script) - Shows how to embed Excalidraw in different environments 5. Documentation (dev-docs/) - API documentation - Integration guides - Component documentation ## Key Features - Real-time collaboration with end-to-end encryption - Export to various formats (PNG, SVG, JSON) - Customizable drawing tools (rectangle, circle, arrows, freehand) - Dark mode support - Localization - Library of shapes and components - Arrow bindings and labels - Image support ## Technology Stack - React for UI - TypeScript for type safety - Firebase for collaboration backend - Jotai for state management - Vite for development and building - IndexedDB/LocalStorage for offline storage The architecture allows for both using Excalidraw as a component in other applications and as a standalone web application with additional features."
