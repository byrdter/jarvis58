              - generic [ref=e990]:
                - code [ref=e991]: "--system-prompt"
                - text: and
                - code [ref=e992]: "--system-prompt-file"
                - text: are mutually exclusive. The append flags can be combined with either replacement flag.
              - generic [ref=e993]:
                - text: "Choose based on whether Claude Code’s default identity still fits your task. Use an append flag when Claude should remain a coding assistant that also follows your extra rules: per-invocation instructions, output formatting, or domain context for a"
                - code [ref=e994]: "-p"
                - text: script. Appending preserves the default tool guidance, safety instructions, and coding conventions, so you only supply what differs. Use a replacement flag when the surface, identity, or permission model differs from Claude Code’s, like a non-coding agent in a pipeline that no human watches. Replacing drops all of the default prompt, including tool guidance and safety instructions, so you take responsibility for whatever your task still needs.
              - generic [ref=e995]:
                - text: These flags apply only to the current invocation. For persistent personas you can switch between and share across a project, use
                - link "output styles" [ref=e996] [cursor=pointer]:
                  - /url: /docs/en/output-styles
                - text: . For project conventions Claude should always follow, use
