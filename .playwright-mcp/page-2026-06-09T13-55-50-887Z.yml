                - generic [ref=e955] [cursor=pointer]: System prompt flags
              - generic [ref=e956]: Claude Code provides four flags for customizing the system prompt. All four work in both interactive and non-interactive modes.
              - table [ref=e959]:
                - rowgroup [ref=e960]:
                  - row "Flag Behavior Example" [ref=e961]:
