          - paragraph [ref=e208]:
            - text: Agent Skills, which we often refer to simply as Skills, can now be added to Messages API requests and the new
            - code [ref=e209]: /v1/skills
            - text: endpoint gives developers programmatic control over custom skill versioning and management. Skills require the
            - link "Code Execution Tool" [ref=e210] [cursor=pointer]:
