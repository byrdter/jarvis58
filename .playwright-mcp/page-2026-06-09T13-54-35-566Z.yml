          - paragraph [ref=e180]: You've already seen Skills at work in Claude apps, where Claude uses them to create files like spreadsheets and presentations. Now, you can build your own skills and use them across Claude apps, Claude Code, and our API.
          - heading "How Skills work" [level=2] [ref=e181]
          - paragraph [ref=e182]: While working on tasks, Claude scans available skills to find relevant matches. When one matches, it loads only the minimal information and files needed—keeping Claude fast while accessing specialized expertise.
          - paragraph [ref=e183]: "Skills are:"
          - list [ref=e184]:
            - listitem [ref=e185]:
              - strong [ref=e186]: Composable
              - text: ": Skills stack together. Claude automatically identifies which skills are needed and coordinates their use."
            - listitem [ref=e187]:
              - strong [ref=e188]: Portable
              - text: ": Skills use the same format everywhere. Build once, use across Claude apps, Claude Code, and API."
            - listitem [ref=e189]:
              - strong [ref=e190]: Efficient
              - text: ": Only loads what's needed, when it's needed."
            - listitem [ref=e191]:
              - strong [ref=e192]: Powerful
              - text: ": Skills can include executable code for tasks where traditional programming is more reliable than token generation."
          - paragraph [ref=e193]:
            - text: Think of Skills as custom onboarding materials that let you package expertise, making Claude a specialist on what matters most to you. For a technical deep-dive on the Agent Skills design pattern, architecture, and development best practices, read our
            - link "engineering blog." [ref=e194] [cursor=pointer]:
              - /url: https://www.anthropic.com/engineering/equipping-agents-for-the-real-world-with-agent-skills
          - heading "Skills work with every Claude product" [level=2] [ref=e195]
          - heading "Claude apps" [level=3] [ref=e196]:
            - strong [ref=e197]: Claude apps
          - paragraph [ref=e198]: Skills are available to Pro, Max, Team and Enterprise users. We provide skills for common tasks like document creation, examples you can customize, and the ability to create your own custom skills.
          - figure [ref=e199]:
            - generic:
              - img "The Skills capabilities interface in Claude.ai with example Skills toggled on."
          - paragraph [ref=e200]:
            - text: Claude automatically invokes relevant skills based on your task—no manual selection needed. You'll even see skills in Claude's chain of thought as it works.
            - text: "Creating skills is simple. The \"skill-creator\" skill provides interactive guidance: Claude asks about your workflow, generates the folder structure, formats the SKILL.md file, and bundles the resources you need. No manual file editing required."
