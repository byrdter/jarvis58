                - generic [ref=e544]: When Claude runs code
            - paragraph [ref=e545]: "Claude runs code when the request benefits from computation or file handling:"
            - list [ref=e546]:
              - listitem [ref=e547]: • Non-trivial math (large numbers, many steps, precision-sensitive results)
              - listitem [ref=e548]: • Data analysis, file parsing, or visualization
              - listitem [ref=e549]: • Algorithm execution or simulation
              - listitem [ref=e550]: • Explicit requests to "run", "compute", or "execute"
            - paragraph [ref=e551]: "Claude answers directly without running code for:"
            - list [ref=e552]:
              - listitem [ref=e553]: • Simple arithmetic and well-known math facts
              - listitem [ref=e554]: • Factual, conversational, or creative requests
              - listitem [ref=e555]: • Simple unit conversions or translations
            - paragraph [ref=e556]: If you want Claude to run code for a borderline request, ask explicitly (for example, "run code to verify this").
            - heading "Copy link to clipboard Using code execution with other execution tools" [level=2] [ref=e557]:
              - generic [ref=e558]:
                - button "Copy link to clipboard" [ref=e560] [cursor=pointer]:
                  - img [ref=e562]
                - generic [ref=e564]: Using code execution with other execution tools
            - paragraph [ref=e565]:
              - text: When you provide code execution alongside client-provided tools that also run code (such as a
              - link "bash tool" [ref=e566] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/bash-tool
              - text: or custom REPL), Claude is operating in a multi-computer environment. The code execution tool runs in Anthropic's sandboxed container, while your client-provided tools run in a separate environment that you control. Claude can sometimes confuse these environments, attempting to use the wrong tool or assuming state is shared between them.
            - paragraph [ref=e567]: "To avoid this, add instructions to your system prompt that clarify the distinction:"
            - generic [ref=e568]:
              - code [ref=e571]: "When multiple code execution environments are available, be aware that: - Variables, files, and state do NOT persist between different execution environments - Use the code_execution tool for general-purpose computation in Anthropic's sandboxed environment - Use client-provided execution tools (e.g., bash) when you need access to the user's local system, files, or data - If you need to pass results between environments, explicitly include outputs in subsequent tool calls rather than assuming shared state"
              - button "Copy code" [ref=e573] [cursor=pointer]:
                - generic [ref=e576]: 
            - paragraph [ref=e577]:
              - text: This is especially important when combining code execution with
              - link "web search" [ref=e578] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/web-search-tool
              - text: or
              - link "web fetch" [ref=e579] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/web-fetch-tool
              - text: ", which enable code execution automatically. If your application already provides a client-side shell tool, the automatic code execution creates a second execution environment that Claude needs to distinguish between."
