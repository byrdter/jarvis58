              - generic [ref=e329]: Run Python and bash code in a sandboxed container to analyze data, generate files, and iterate on solutions.
            - paragraph [ref=e330]: Claude can analyze data, create visualizations, perform complex calculations, run system commands, create and edit files, and process uploaded files directly within the API conversation. The code execution tool allows Claude to run Bash commands and manipulate files, including writing code, in a secure, sandboxed environment.
            - paragraph [ref=e331]:
              - strong [ref=e332]: Code execution is free when used with web search or web fetch.
              - text: When
              - code [ref=e333]: web_search_20260209
              - text: or
              - code [ref=e334]: web_fetch_20260209
              - text: is included in your request, there are no additional charges for code execution tool calls beyond the standard input and output token costs. Standard code execution charges apply when these tools are not included.
            - paragraph [ref=e335]: Code execution is a core primitive for building high-performance agents. It enables dynamic filtering in web search and web fetch tools, allowing Claude to process results before they reach the context window, improving accuracy while reducing token consumption.
