                  - listitem [ref=e530]:
                    - text: •
                    - strong [ref=e531]: Bash commands
                    - text: ": Execute shell commands for system operations and package management"
                  - listitem [ref=e532]:
                    - text: •
                    - strong [ref=e533]: File operations
                    - text: ": Create, view, and edit files directly, including writing code"
              - listitem [ref=e534]: Claude can use any combination of these capabilities in a single request
              - listitem [ref=e535]: All operations run in a secure sandbox environment
              - listitem [ref=e536]: Claude provides results with any generated charts, calculations, or analysis
            - heading "Copy link to clipboard When Claude runs code" [level=3] [ref=e537]:
