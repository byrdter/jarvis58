              - article [ref=e311]:
                - blockquote [ref=e312]:
                  - paragraph [ref=e313]:
                    - strong [ref=e314]: "Note:"
                    - text: This repository contains Anthropic's implementation of skills for Claude. For information about the Agent Skills standard, see
                    - link "agentskills.io" [ref=e315] [cursor=pointer]:
                      - /url: http://agentskills.io
                    - text: .
                - paragraph [ref=e316]:
                  - link "skills.sh" [ref=e317] [cursor=pointer]:
                    - /url: https://skills.sh/anthropics/skills
                    - img "skills.sh" [ref=e318]
                - generic [ref=e319]:
                  - heading "Skills" [level=1] [ref=e320]
                  - 'link "Permalink: Skills" [ref=e321] [cursor=pointer]':
                    - /url: "#skills"
                    - img [ref=e322]
                - paragraph [ref=e324]: Skills are folders of instructions, scripts, and resources that Claude loads dynamically to improve performance on specialized tasks. Skills teach Claude how to complete specific tasks in a repeatable way, whether that's creating documents with your company's brand guidelines, analyzing data using your organization's specific workflows, or automating personal tasks.
                - paragraph [ref=e325]: "For more information, check out:"
                - list [ref=e326]:
                  - listitem [ref=e327]:
                    - link "What are skills?" [ref=e328] [cursor=pointer]:
                      - /url: https://support.claude.com/en/articles/12512176-what-are-skills
                  - listitem [ref=e329]:
                    - link "Using skills in Claude" [ref=e330] [cursor=pointer]:
                      - /url: https://support.claude.com/en/articles/12512180-using-skills-in-claude
                  - listitem [ref=e331]:
                    - link "How to create custom skills" [ref=e332] [cursor=pointer]:
                      - /url: https://support.claude.com/en/articles/12512198-creating-custom-skills
                  - listitem [ref=e333]:
                    - link "Equipping agents for the real world with Agent Skills" [ref=e334] [cursor=pointer]:
                      - /url: https://anthropic.com/engineering/equipping-agents-for-the-real-world-with-agent-skills
                - generic [ref=e335]:
                  - heading "About This Repository" [level=1] [ref=e336]
                  - 'link "Permalink: About This Repository" [ref=e337] [cursor=pointer]':
                    - /url: "#about-this-repository"
                    - img [ref=e338]
                - paragraph [ref=e340]: This repository contains skills that demonstrate what's possible with Claude's skills system. These skills range from creative applications (art, music, design) to technical tasks (testing web apps, MCP server generation) to enterprise workflows (communications, branding, etc.).
                - paragraph [ref=e341]:
                  - text: Each skill is self-contained in its own folder with a
                  - code [ref=e342]: SKILL.md
                  - text: file containing the instructions and metadata that Claude uses. Browse through these skills to get inspiration for your own skills or to understand different patterns and approaches.
                - paragraph [ref=e343]:
                  - text: Many skills in this repo are open source (Apache 2.0). We've also included the document creation & editing skills that power
                  - link "Claude's document capabilities" [ref=e344] [cursor=pointer]:
                    - /url: https://www.anthropic.com/news/create-files
                  - text: under the hood in the
                  - link "skills/docx" [ref=e345] [cursor=pointer]:
                    - /url: /anthropics/skills/blob/main/skills/docx
                    - code [ref=e346]: skills/docx
                  - text: ","
                  - link "skills/pdf" [ref=e347] [cursor=pointer]:
                    - /url: /anthropics/skills/blob/main/skills/pdf
                    - code [ref=e348]: skills/pdf
                  - text: ","
                  - link "skills/pptx" [ref=e349] [cursor=pointer]:
                    - /url: /anthropics/skills/blob/main/skills/pptx
                    - code [ref=e350]: skills/pptx
                  - text: ", and"
                  - link "skills/xlsx" [ref=e351] [cursor=pointer]:
                    - /url: /anthropics/skills/blob/main/skills/xlsx
                    - code [ref=e352]: skills/xlsx
                  - text: subfolders. These are source-available, not open source, but we wanted to share these with developers as a reference for more complex skills that are actively used in a production AI application.
                - generic [ref=e353]:
