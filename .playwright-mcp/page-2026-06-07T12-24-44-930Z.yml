              - link "PostgreSQL 19 Beta 1 Released!" [ref=e73] [cursor=pointer]:
                - /url: /about/news/postgresql-19-beta-1-released-3313/
          - paragraph [ref=e74]:
            - text: The PostgreSQL Global Development Group announces that the first beta release of PostgreSQL 19 is now
            - link "available for download" [ref=e75] [cursor=pointer]:
              - /url: /download/
            - text: . This release contains PostgreSQL 19 feature previews ahead of general availability, though some details of the release can change during the beta period.
          - paragraph [ref=e76]:
            - text: You can find information about all of the PostgreSQL 19 features and changes in the
            - link "release notes" [ref=e77] [cursor=pointer]:
              - /url: /docs/19/release-19.html
            - text: .
          - paragraph [ref=e78]: In the spirit of the open source PostgreSQL community, we strongly encourage you to test the new features of PostgreSQL 19 on your systems to help us eliminate bugs and other issues. While we do not advise you to run beta versions in production environments, we encourage you to find ways to run your typical application workloads against this beta release.
          - paragraph [ref=e79]:
            - text: Your testing and feedback help the community ensure that PostgreSQL 19 upholds our standards of delivering a stable, reliable release of the world's most advanced open source relational database. Please read more about our
            - link "beta testing process" [ref=e80] [cursor=pointer]:
              - /url: /developer/beta/
            - text: and how you can contribute.
          - paragraph [ref=e81]:
            - text: PostgreSQL 14 will stop receiving fixes on November 12, 2026. If you are running PostgreSQL 14 in a production environment, we suggest that you make plans to upgrade to a newer, supported version of PostgreSQL. Please see our
            - link "versioning policy" [ref=e82] [cursor=pointer]:
              - /url: /support/versioning/
            - text: for more information.
