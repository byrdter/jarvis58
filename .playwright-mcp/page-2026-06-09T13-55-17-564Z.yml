            - heading "Copy link to clipboard Security considerations" [level=2] [ref=e715]:
              - generic [ref=e716]:
                - button "Copy link to clipboard" [ref=e718] [cursor=pointer]:
                  - img [ref=e720]
                - generic [ref=e722]: Security considerations
            - paragraph [ref=e723]: "Use Skills only from trusted sources: those you created yourself or obtained from Anthropic. Skills provide Claude with new capabilities through instructions and code, and while this makes them powerful, it also means a malicious Skill can direct Claude to invoke tools or execute code in ways that don't match the Skill's stated purpose."
            - generic [ref=e724]:
              - img [ref=e727]
              - paragraph [ref=e730]: If you must use a Skill from an untrusted or unknown source, exercise extreme caution and thoroughly audit it before use. Depending on what access Claude has when executing the Skill, malicious Skills could lead to data exfiltration, unauthorized system access, or other security risks.
            - paragraph [ref=e731]:
              - strong [ref=e732]: Key security considerations
              - text: ":"
            - list [ref=e733]:
              - listitem [ref=e734]:
                - text: •
                - strong [ref=e735]: Audit thoroughly
                - text: ": Review all files bundled in the Skill: SKILL.md, scripts, images, and other resources. Look for unusual patterns like unexpected network calls, file access patterns, or operations that don't match the Skill's stated purpose"
              - listitem [ref=e736]:
                - text: •
                - strong [ref=e737]: External sources are risky
                - text: ": Skills that fetch data from external URLs pose particular risk, as fetched content may contain malicious instructions. Even trustworthy Skills can be compromised if their external dependencies change over time"
              - listitem [ref=e738]:
                - text: •
                - strong [ref=e739]: Tool misuse
                - text: ": Malicious Skills can invoke tools (file operations, bash commands, code execution) in harmful ways"
              - listitem [ref=e740]:
                - text: •
                - strong [ref=e741]: Data exposure
                - text: ": Skills with access to sensitive data could be designed to leak information to external systems"
              - listitem [ref=e742]:
                - text: •
                - strong [ref=e743]: Treat like installing software
                - text: ": Only use Skills from trusted sources. Be especially careful when integrating Skills into production systems with access to sensitive data or critical operations"
