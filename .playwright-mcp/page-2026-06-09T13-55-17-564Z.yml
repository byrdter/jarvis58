            - paragraph [ref=e526]: Progressive disclosure ensures only relevant content occupies the context window at any given time.
            - heading "Copy link to clipboard The Skills architecture" [level=3] [ref=e527]:
              - generic [ref=e528]:
                - button "Copy link to clipboard" [ref=e530] [cursor=pointer]:
                  - img [ref=e532]
                - generic [ref=e534]: The Skills architecture
            - paragraph [ref=e535]: "Skills run in a code execution environment where Claude has filesystem access, bash commands, and code execution capabilities. Think of it like this: Skills exist as directories on a virtual machine, and Claude interacts with them using the same bash commands you'd use to navigate files on your computer."
            - paragraph [ref=e536]:
              - img "Agent Skills Architecture - showing how Skills integrate with the agent's configuration and virtual machine" [ref=e537]
            - paragraph [ref=e538]:
              - strong [ref=e539]: "How Claude accesses Skill content:"
            - paragraph [ref=e540]: When a Skill is triggered, Claude uses bash to read SKILL.md from the filesystem, bringing its instructions into the context window. If those instructions reference other files (like FORMS.md or a database schema), Claude reads those files too using additional bash commands. When instructions mention executable scripts, Claude runs them via bash and receives only the output (the script code itself never enters context).
            - paragraph [ref=e541]:
              - strong [ref=e542]: "What this architecture enables:"
            - paragraph [ref=e543]:
              - strong [ref=e544]: On-demand file access
              - text: ": Claude reads only the files needed for each specific task. A Skill can include dozens of reference files, but if your task only needs the sales schema, Claude loads just that one file. The rest remain on the filesystem consuming zero tokens."
            - paragraph [ref=e545]:
              - strong [ref=e546]: Efficient script execution
              - text: ": When Claude runs"
              - code [ref=e547]: validate_form.py
              - text: ", the script's code never loads into the context window. Only the script's output (like \"Validation passed\" or specific error messages) consumes tokens. This makes scripts far more efficient than having Claude generate equivalent code on the fly."
            - paragraph [ref=e548]:
              - strong [ref=e549]: No practical limit on bundled content
              - text: ": Because files don't consume context until accessed, Skills can include comprehensive API documentation, large datasets, extensive examples, or any reference materials you need. There's no context penalty for bundled content that isn't used."
            - paragraph [ref=e550]: This filesystem-based model is what makes progressive disclosure work. Claude navigates your Skill like you'd reference specific sections of an onboarding guide, accessing exactly what each task requires.
