                  - img [ref=e1327]
                - generic [ref=e1329]: Best practices
            - heading "Copy link to clipboard Tool design" [level=3] [ref=e1330]:
              - generic [ref=e1331]:
                - button "Copy link to clipboard" [ref=e1333] [cursor=pointer]:
                  - img [ref=e1335]
                - generic [ref=e1337]: Tool design
            - list [ref=e1338]:
              - listitem [ref=e1339]:
                - text: •
                - strong [ref=e1340]: "Provide detailed output descriptions:"
                - text: Because Claude deserializes tool results in code, clearly document the format (JSON structure and field types)
              - listitem [ref=e1341]:
                - text: •
                - strong [ref=e1342]: "Return structured data:"
                - text: JSON or other easily parseable formats work best for programmatic processing
              - listitem [ref=e1343]:
                - text: •
                - strong [ref=e1344]: "Keep responses concise:"
                - text: Return only necessary data to minimize processing overhead
            - heading "Copy link to clipboard When to use programmatic calling" [level=3] [ref=e1345]:
              - generic [ref=e1346]:
                - button "Copy link to clipboard" [ref=e1348] [cursor=pointer]:
                  - img [ref=e1350]
                - generic [ref=e1352]: When to use programmatic calling
            - paragraph [ref=e1353]: Programmatic tool calling trades a small fixed overhead (container startup, script generation) for large savings on tool-result tokens and model round-trips. Whether that trade pays off depends on workload shape.
            - paragraph [ref=e1354]:
              - strong [ref=e1355]: "Strong fit:"
            - list [ref=e1356]:
              - listitem [ref=e1357]: • Fan-out or parallel operations across many items (for example, checking 50 endpoints or looking up 20 records)
              - listitem [ref=e1358]: • Large tool results that can be filtered, aggregated, or summarized before reaching Claude's context
              - listitem [ref=e1359]: • Agentic search and retrieval, where iterative querying and result filtering dominate the workflow
            - paragraph [ref=e1360]:
              - strong [ref=e1361]: "Weak fit:"
            - list [ref=e1362]:
              - listitem [ref=e1363]: • Strictly sequential workflows where each call depends on Claude reasoning over the previous result, because the script cannot skip the model round-trip in that case
              - listitem [ref=e1364]: • A small number of tool calls with small responses, especially on the first turn of a conversation, where container and script overhead can exceed the savings
              - listitem [ref=e1365]: • Tools that require immediate user feedback between calls
            - paragraph [ref=e1366]:
              - text: If you are unsure, measure billed input tokens with and without
              - code [ref=e1367]: allowed_callers
              - text: on a representative sample of your traffic before enabling it broadly.
            - heading "Copy link to clipboard Performance optimization" [level=3] [ref=e1368]:
              - generic [ref=e1369]:
                - button "Copy link to clipboard" [ref=e1371] [cursor=pointer]:
                  - img [ref=e1373]
                - generic [ref=e1375]: Performance optimization
            - list [ref=e1376]:
              - listitem [ref=e1377]:
                - text: •
                - strong [ref=e1378]: Reuse containers
                - text: when making multiple related requests to maintain state
              - listitem [ref=e1379]:
                - text: •
                - strong [ref=e1380]: Batch similar operations
                - text: in a single code execution when possible
            - heading "Copy link to clipboard Troubleshooting" [level=2] [ref=e1381]:
