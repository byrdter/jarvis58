            - paragraph [ref=e1255]: This restriction only applies when responding to programmatic (code execution) tool calls. For regular client-side tool calls, you can include text content after tool results.
            - heading "Copy link to clipboard Rate limits" [level=3] [ref=e1256]:
              - generic [ref=e1257]:
                - button "Copy link to clipboard" [ref=e1259] [cursor=pointer]:
                  - img [ref=e1261]
                - generic [ref=e1263]: Rate limits
            - paragraph [ref=e1264]: Programmatic tool calls are subject to the same rate limits as regular tool calls. Each tool call from code execution counts as a separate invocation.
            - heading "Copy link to clipboard Validate tool results before use" [level=3] [ref=e1265]:
              - generic [ref=e1266]:
                - button "Copy link to clipboard" [ref=e1268] [cursor=pointer]:
