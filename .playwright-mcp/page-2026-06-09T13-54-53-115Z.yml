                - text: block
              - listitem [ref=e468]: You provide the tool result, and code execution continues (intermediate results are not loaded into Claude's context window)
              - listitem [ref=e469]: Once all code execution completes, Claude receives the final output and continues working on the task
            - paragraph [ref=e470]: "This approach is particularly useful for:"
            - list [ref=e471]:
