            - paragraph [ref=e329]:
              - text: Programmatic tool calling allows Claude to write code that calls your tools programmatically within a
              - link "code execution" [ref=e330] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/code-execution-tool
              - text: container, rather than requiring round trips through the model for each tool invocation. This reduces latency for multi-tool workflows and decreases token consumption by allowing Claude to filter or process data before it reaches the model's context window. On agentic search benchmarks like
              - link "BrowseComp" [ref=e331] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2504.12516
              - text: and
              - link "DeepSearchQA" [ref=e332] [cursor=pointer]:
                - /url: https://github.com/google-deepmind/deepsearchqa
              - text: ", which test multi-step web research and complex information retrieval, adding programmatic tool calling on top of basic search tools improved performance by an average of 11% while using 24% fewer input tokens (see"
              - link "Improved web search with dynamic filtering" [ref=e333] [cursor=pointer]:
                - /url: https://claude.com/blog/improved-web-search-with-dynamic-filtering
              - text: ).
            - paragraph [ref=e334]: "The difference compounds fast in real workflows. Consider checking budget compliance across 20 employees: the traditional approach requires 20 separate model round-trips, pulling thousands of expense line items into the context along the way. With programmatic tool calling, a single script runs all 20 lookups, filters the results, and returns only the employees who exceeded their limits, shrinking what Claude needs to reason over from hundreds of kilobytes down to a handful of lines."
            - generic [ref=e335]:
