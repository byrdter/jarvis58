                - generic [ref=e1272]: Validate tool results before use
            - paragraph [ref=e1273]: "When implementing user-defined tools that will be called programmatically:"
            - list [ref=e1274]:
              - listitem [ref=e1275]:
                - text: •
                - strong [ref=e1276]: "Tool results are returned as strings:"
                - text: They can contain any content, including code snippets or executable commands that may be processed by the execution environment.
              - listitem [ref=e1277]:
                - text: •
                - strong [ref=e1278]: "Validate external tool results:"
                - text: If your tool returns data from external sources or accepts user input, be aware of code injection risks if the output will be interpreted or executed as code.
            - heading "Copy link to clipboard Token efficiency" [level=2] [ref=e1279]:
              - generic [ref=e1280]:
                - button "Copy link to clipboard" [ref=e1282] [cursor=pointer]:
                  - img [ref=e1284]
                - generic [ref=e1286]: Token efficiency
            - paragraph [ref=e1287]: "Programmatic tool calling can significantly reduce token consumption:"
            - list [ref=e1288]:
              - listitem [ref=e1289]:
                - text: •
                - strong [ref=e1290]: Tool results from programmatic calls are not added to Claude's context
                - text: "- only the final code output is"
              - listitem [ref=e1291]:
                - text: •
                - strong [ref=e1292]: Intermediate processing happens in code
                - text: "- filtering, aggregation, and other transformations don't consume model tokens"
              - listitem [ref=e1293]:
                - text: •
                - strong [ref=e1294]: Multiple tool calls in one code execution
                - text: "- reduces overhead compared to separate model turns"
            - paragraph [ref=e1295]: For example, calling 10 tools directly uses ~10x the tokens of calling them programmatically and returning a summary.
            - paragraph [ref=e1296]: "In Anthropic's internal evaluations on a production Claude model:"
            - list [ref=e1297]:
              - listitem [ref=e1298]: • On a 75-tool project-management agent benchmark, enabling programmatic tool calling reduced billed input tokens by roughly 38% with no change in task accuracy.
              - listitem [ref=e1299]:
                - text: • On
                - link "τ²-bench" [ref=e1300] [cursor=pointer]:
                  - /url: https://arxiv.org/abs/2506.07982
                - text: (airline, retail, and telecom domains), where each turn makes one or two sequential tool calls, programmatic tool calling left scores unchanged and cost roughly 8% more. Sequential single-call workflows do not benefit.
              - listitem [ref=e1301]:
                - text: • Across production API traffic, requests whose
                - code [ref=e1302]: tools
                - text: array contains 10 to 49 tool definitions see typical token savings of 20% to 40% with programmatic tool calling enabled.
            - paragraph [ref=e1303]:
              - text: Actual savings vary with workload shape; see
              - link "When to use programmatic calling" [ref=e1304] [cursor=pointer]:
                - /url: "#when-to-use-programmatic-calling"
              - text: .
            - heading "Copy link to clipboard Usage and pricing" [level=2] [ref=e1305]:
              - generic [ref=e1306]:
                - button "Copy link to clipboard" [ref=e1308] [cursor=pointer]:
                  - img [ref=e1310]
                - generic [ref=e1312]: Usage and pricing
            - paragraph [ref=e1313]:
              - text: Programmatic tool calling uses the same pricing as code execution. See the
              - link "code execution pricing" [ref=e1314] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/code-execution-tool#usage-and-pricing
              - text: for details.
            - generic [ref=e1315]:
              - img [ref=e1318]
              - paragraph [ref=e1321]: "Token counting for programmatic tool calls: Tool results from programmatic invocations do not count toward your input/output token usage. Only the final code execution result and Claude's response count."
            - heading "Copy link to clipboard Best practices" [level=2] [ref=e1322]:
