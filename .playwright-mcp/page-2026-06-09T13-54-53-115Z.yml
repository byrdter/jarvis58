            - heading "Copy link to clipboard Why programmatic tool calling works" [level=2] [ref=e1439]:
              - generic [ref=e1440]:
                - button "Copy link to clipboard" [ref=e1442] [cursor=pointer]:
                  - img [ref=e1444]
                - generic [ref=e1446]: Why programmatic tool calling works
            - paragraph [ref=e1447]: "Claude's training includes extensive exposure to code, making it effective at reasoning through and chaining function calls. When tools are presented as callable functions within a code execution environment, Claude can leverage this strength to:"
            - list [ref=e1448]:
              - listitem [ref=e1449]:
                - text: •
                - strong [ref=e1450]: "Reason naturally about tool composition:"
                - text: Chain operations and handle dependencies as naturally as writing any Python code
              - listitem [ref=e1451]:
                - text: •
                - strong [ref=e1452]: "Process large results efficiently:"
                - text: Filter down large tool outputs, extract only relevant data, or write intermediate results to files before returning summaries to the context window
              - listitem [ref=e1453]:
                - text: •
                - strong [ref=e1454]: "Reduce latency significantly:"
                - text: Eliminate the overhead of re-sampling Claude between each tool call in multi-step workflows
            - paragraph [ref=e1455]: This approach enables workflows that would be impractical with traditional tool use (such as processing files over 1M tokens) by allowing Claude to work with data programmatically rather than loading everything into the conversation context.
            - heading "Copy link to clipboard Alternative implementations" [level=2] [ref=e1456]:
              - generic [ref=e1457]:
                - button "Copy link to clipboard" [ref=e1459] [cursor=pointer]:
                  - img [ref=e1461]
                - generic [ref=e1463]: Alternative implementations
            - paragraph [ref=e1464]: "Programmatic tool calling is a generalizable pattern that can also be implemented on your own infrastructure. Here's how the approaches compare:"
            - heading "Copy link to clipboard Client-side direct execution" [level=3] [ref=e1465]:
              - generic [ref=e1466]:
                - button "Copy link to clipboard" [ref=e1468] [cursor=pointer]:
                  - img [ref=e1470]
                - generic [ref=e1472]: Client-side direct execution
            - paragraph [ref=e1473]: Provide Claude with a code execution tool and describe what functions are available in that environment. When Claude invokes the tool with code, your application executes it locally where those functions are defined.
            - paragraph [ref=e1474]:
              - strong [ref=e1475]: "Advantages:"
            - list [ref=e1476]:
              - listitem [ref=e1477]: • Simple to implement with minimal re-architecting
              - listitem [ref=e1478]: • Full control over the environment and instructions
            - paragraph [ref=e1479]:
              - strong [ref=e1480]: "Disadvantages:"
            - list [ref=e1481]:
              - listitem [ref=e1482]: • Executes untrusted code outside of a sandbox
              - listitem [ref=e1483]: • Tool invocations can be vectors for code injection
            - paragraph [ref=e1484]:
              - strong [ref=e1485]: "Use when:"
              - text: Your application can safely execute arbitrary code, you want a simple solution, and Anthropic's managed offering doesn't fit your needs.
            - heading "Copy link to clipboard Self-managed sandboxed execution" [level=3] [ref=e1486]:
              - generic [ref=e1487]:
                - button "Copy link to clipboard" [ref=e1489] [cursor=pointer]:
                  - img [ref=e1491]
                - generic [ref=e1493]: Self-managed sandboxed execution
            - paragraph [ref=e1494]: Same approach from Claude's perspective, but code runs in a sandboxed container with security restrictions (for example, no network egress). If your tools require external resources, you'll need a protocol for executing tool calls outside the sandbox.
            - paragraph [ref=e1495]:
              - strong [ref=e1496]: "Advantages:"
            - list [ref=e1497]:
              - listitem [ref=e1498]: • Safe programmatic tool calling on your own infrastructure
              - listitem [ref=e1499]: • Full control over the execution environment
            - paragraph [ref=e1500]:
              - strong [ref=e1501]: "Disadvantages:"
            - list [ref=e1502]:
              - listitem [ref=e1503]: • Complex to build and maintain
              - listitem [ref=e1504]: • Requires managing both infrastructure and inter-process communication
            - paragraph [ref=e1505]:
              - strong [ref=e1506]: "Use when:"
              - text: Security is critical and Anthropic's managed solution doesn't fit your requirements.
            - heading "Copy link to clipboard Anthropic-managed execution" [level=3] [ref=e1507]:
              - generic [ref=e1508]:
                - button "Copy link to clipboard" [ref=e1510] [cursor=pointer]:
                  - img [ref=e1512]
                - generic [ref=e1514]: Anthropic-managed execution
            - paragraph [ref=e1515]: Anthropic's programmatic tool calling is a managed version of sandboxed execution with an opinionated Python environment tuned for Claude. Anthropic handles container management, code execution, and secure tool invocation communication.
            - paragraph [ref=e1516]:
              - strong [ref=e1517]: "Advantages:"
            - list [ref=e1518]:
              - listitem [ref=e1519]: • Safe and secure by default
              - listitem [ref=e1520]: • Easy to enable with minimal configuration
              - listitem [ref=e1521]: • Environment and instructions optimized for Claude
            - paragraph [ref=e1522]:
              - text: Consider using Anthropic's managed solution if you're using the Claude API,
