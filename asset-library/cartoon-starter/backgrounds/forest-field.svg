<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">forest-field.svg</title>
  <desc id="desc">Reusable 16:9 flat cartoon background for explainer scenes.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f7f1df"/>
  <g id="background" filter="url(#paperNoise)">
    <rect width="1280" height="720" fill="#bee4e8"/><rect x="0" y="490" width="1280" height="230" fill="#7bb36a"/><circle class="ink" cx="230" cy="300" r="100" fill="#9bd6b5"/><circle class="ink" cx="430" cy="330" r="130" fill="#7bb36a"/><circle class="ink" cx="930" cy="310" r="118" fill="#9bd6b5"/><path class="ink no-fill" d="M230 392 v148 M430 454 v118 M930 420 v130"/><path class="thin no-fill" d="M145 565 q235 -80 455 0 q245 88 520 -10"/>
  </g>
</svg>
