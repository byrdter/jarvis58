<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">city.svg</title>
  <desc id="desc">Reusable 16:9 flat cartoon background for explainer scenes.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f7f1df"/>
  <g id="background" filter="url(#paperNoise)">
    <rect width="1280" height="720" fill="#b9dce8"/><rect x="0" y="545" width="1280" height="175" fill="#60707c"/><rect class="ink" x="82" y="282" width="150" height="263" fill="#fff8e8"/><rect class="ink" x="280" y="196" width="190" height="349" fill="#55a6c8"/><rect class="ink" x="548" y="250" width="150" height="295" fill="#f2c14e"/><rect class="ink" x="775" y="156" width="230" height="389" fill="#9bd6b5"/><path class="thin no-fill" d="M120 338 h74 M120 394 h74 M320 258 h110 M320 320 h110 M824 222 h136 M824 289 h136"/>
  </g>
</svg>
