<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">library.svg</title>
  <desc id="desc">Reusable 16:9 flat cartoon background for explainer scenes.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f7f1df"/>
  <g id="background" filter="url(#paperNoise)">
    <rect width="1280" height="720" fill="#ead4aa"/><rect x="0" y="512" width="1280" height="208" fill="#9c7250"/><rect class="ink" x="90" y="100" width="350" height="380" rx="18" fill="#d9a36c"/><rect class="ink" x="820" y="100" width="350" height="380" rx="18" fill="#d9a36c"/><g><path class="thin no-fill" d="M125 158 h280 M855 158 h280"/><path class="thin no-fill" d="M125 216 h280 M855 216 h280"/><path class="thin no-fill" d="M125 274 h280 M855 274 h280"/><path class="thin no-fill" d="M125 332 h280 M855 332 h280"/><path class="thin no-fill" d="M125 390 h280 M855 390 h280"/></g><rect class="ink" x="510" y="330" width="240" height="110" rx="18" fill="#fff8e8"/>
  </g>
</svg>
