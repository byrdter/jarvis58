<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">factory.svg</title>
  <desc id="desc">Reusable 16:9 flat cartoon background for explainer scenes.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f7f1df"/>
  <g id="background" filter="url(#paperNoise)">
    <rect width="1280" height="720" fill="#c9d8dd"/><rect x="0" y="510" width="1280" height="210" fill="#858f91"/><path class="ink" d="M100 505 V260 l160 82 v-82 l160 82 v-82 l160 82 v163z" fill="#60707c"/><rect class="ink" x="760" y="188" width="260" height="317" rx="18" fill="#fff8e8"/><path class="thin no-fill" d="M155 425 h370 M805 248 h170 M805 310 h170 M805 372 h170"/><circle class="thin" cx="1040" cy="160" r="52" fill="#f2c14e"/>
  </g>
</svg>
