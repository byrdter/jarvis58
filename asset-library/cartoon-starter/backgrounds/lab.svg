<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">lab.svg</title>
  <desc id="desc">Reusable 16:9 flat cartoon background for explainer scenes.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f7f1df"/>
  <g id="background" filter="url(#paperNoise)">
    <rect x="0" y="0" width="1280" height="720" fill="#a8dbe8"/><rect x="0" y="480" width="1280" height="240" fill="#fff8e8"/><rect class="ink" x="80" y="112" width="270" height="198" rx="18" fill="#ffffff"/><path class="thin no-fill" d="M117 163 h183 M117 207 h143 M117 251 h92"/><rect class="ink" x="830" y="162" width="286" height="318" rx="20" fill="#9bd6b5"/><path class="thin no-fill" d="M873 217 h200 M873 276 h153 M873 335 h184"/><circle class="thin" cx="1030" cy="585" r="42" fill="#f2c14e"/>
  </g>
</svg>
