<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">podcast-studio.svg</title>
  <desc id="desc">Reusable 16:9 flat cartoon background for explainer scenes.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f7f1df"/>
  <g id="background" filter="url(#paperNoise)">
    <rect width="1280" height="720" fill="#dfc2d8"/><rect x="0" y="500" width="1280" height="220" fill="#786f86"/><rect class="ink" x="130" y="116" width="330" height="260" rx="24" fill="#fff8e8"/><rect class="ink" x="820" y="120" width="260" height="260" rx="24" fill="#60707c"/><circle class="thin" cx="640" cy="310" r="96" fill="#f2c14e"/><path class="thin no-fill" d="M640 125 v142 M595 265 q45 42 90 0 M872 190 h155 M872 250 h125"/>
  </g>
</svg>
