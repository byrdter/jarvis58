<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">thumbnail-frame</title>
  <desc id="desc">Reusable cartoon prop with thick outline and transparent background.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="240" height="240" rx="24" fill="none"/>
  <g id="prop" filter="url(#paperNoise)">
    <ellipse class="asset-shadow" cx="120" cy="205" rx="70" ry="12"/>
    <rect class="ink" x="38" y="55" width="164" height="116" rx="16" fill="#a8dbe8"/><path class="thin no-fill" d="M62 145 l42 -42 l31 31 l20 -20 l25 31"/><circle class="thin" cx="164" cy="88" r="14" fill="#f2c14e"/><rect class="ink" x="58" y="181" width="124" height="22" rx="10" fill="#e96f5f"/>
  </g>
</svg>
