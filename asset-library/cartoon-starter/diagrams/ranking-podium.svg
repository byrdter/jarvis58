<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
  <title id="title">ranking-podium.svg</title>
  <desc id="desc">Reusable explainer diagram element for labels, callouts, charts, and motion paths.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="420" height="260" rx="24" fill="none"/>
  <g id="diagram">
    <rect class="ink" x="158" y="83" width="104" height="128" rx="14" fill="#f2c14e"/><rect class="ink" x="62" y="132" width="104" height="79" rx="14" fill="#a8dbe8"/><rect class="ink" x="254" y="156" width="104" height="55" rx="14" fill="#7bb36a"/><text x="197" y="151" font-size="42" fill="#28313b">1</text><text x="101" y="183" font-size="34" fill="#28313b">2</text><text x="293" y="194" font-size="30" fill="#28313b">3</text>
  </g>
</svg>
