<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
  <title id="title">probability-balls.svg</title>
  <desc id="desc">Reusable explainer diagram element for labels, callouts, charts, and motion paths.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="420" height="260" rx="24" fill="none"/>
  <g id="diagram">
    <rect class="ink" x="65" y="56" width="290" height="148" rx="22" fill="#fff8e8"/><g><circle cx="94" cy="91" r="11" fill="#e96f5f" stroke="#28313b" stroke-width="4"/><circle cx="125" cy="91" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="156" cy="91" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="187" cy="91" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="218" cy="91" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="249" cy="91" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="280" cy="91" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="311" cy="91" r="11" fill="#e96f5f" stroke="#28313b" stroke-width="4"/><circle cx="94" cy="130" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="125" cy="130" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="156" cy="130" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="187" cy="130" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="218" cy="130" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="249" cy="130" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="280" cy="130" r="11" fill="#e96f5f" stroke="#28313b" stroke-width="4"/><circle cx="311" cy="130" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="94" cy="169" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="125" cy="169" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="156" cy="169" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="187" cy="169" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="218" cy="169" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="249" cy="169" r="11" fill="#e96f5f" stroke="#28313b" stroke-width="4"/><circle cx="280" cy="169" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/><circle cx="311" cy="169" r="11" fill="#a8dbe8" stroke="#28313b" stroke-width="4"/></g>
  </g>
</svg>
