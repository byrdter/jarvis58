<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
  <title id="title">heatmap-grid.svg</title>
  <desc id="desc">Reusable explainer diagram element for labels, callouts, charts, and motion paths.</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <style>
      .ink{stroke:#28313b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#28313b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .no-fill{fill:none}
      .asset-shadow{fill:#1f2a33;opacity:.16}
      text{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:0}
    </style>
  </defs>

  <rect width="420" height="260" rx="24" fill="none"/>
  <g id="diagram">
    <rect class="ink" x="70" y="40" width="280" height="180" rx="18" fill="#fff8e8"/><g><rect x="95" y="66" width="28" height="24" rx="5" fill="#a8dbe8" opacity="0.5700000000000001"/><rect x="134" y="66" width="28" height="24" rx="5" fill="#f2c14e" opacity="0.5700000000000001"/><rect x="173" y="66" width="28" height="24" rx="5" fill="#e96f5f" opacity="0.5700000000000001"/><rect x="212" y="66" width="28" height="24" rx="5" fill="#7bb36a" opacity="0.5700000000000001"/><rect x="251" y="66" width="28" height="24" rx="5" fill="#a8dbe8" opacity="0.5700000000000001"/><rect x="290" y="66" width="28" height="24" rx="5" fill="#f2c14e" opacity="0.5700000000000001"/><rect x="95" y="100" width="28" height="24" rx="5" fill="#f2c14e" opacity="0.5700000000000001"/><rect x="134" y="100" width="28" height="24" rx="5" fill="#e96f5f" opacity="0.69"/><rect x="173" y="100" width="28" height="24" rx="5" fill="#7bb36a" opacity="0.81"/><rect x="212" y="100" width="28" height="24" rx="5" fill="#a8dbe8" opacity="0.45"/><rect x="251" y="100" width="28" height="24" rx="5" fill="#f2c14e" opacity="0.5700000000000001"/><rect x="290" y="100" width="28" height="24" rx="5" fill="#e96f5f" opacity="0.69"/><rect x="95" y="134" width="28" height="24" rx="5" fill="#e96f5f" opacity="0.5700000000000001"/><rect x="134" y="134" width="28" height="24" rx="5" fill="#7bb36a" opacity="0.81"/><rect x="173" y="134" width="28" height="24" rx="5" fill="#a8dbe8" opacity="0.5700000000000001"/><rect x="212" y="134" width="28" height="24" rx="5" fill="#f2c14e" opacity="0.81"/><rect x="251" y="134" width="28" height="24" rx="5" fill="#e96f5f" opacity="0.5700000000000001"/><rect x="290" y="134" width="28" height="24" rx="5" fill="#7bb36a" opacity="0.81"/><rect x="95" y="168" width="28" height="24" rx="5" fill="#7bb36a" opacity="0.5700000000000001"/><rect x="134" y="168" width="28" height="24" rx="5" fill="#a8dbe8" opacity="0.45"/><rect x="173" y="168" width="28" height="24" rx="5" fill="#f2c14e" opacity="0.81"/><rect x="21