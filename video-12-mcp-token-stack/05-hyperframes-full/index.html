            ["Subscribe", "The next episode turns this architecture into measured runs.", "next test"],
            ["Like", "It tells YouTube this kind of engineering evidence is worth showing.", "signal"],
            ["Notify", "Ring the bell so the JARVIS measurement video does not disappear in the feed.", "follow-up"],
            ["Evidence", "Cloudflare, Anthropic, Arcade, Scalekit, and our own workflow become the test bench.", "receipts"]
          ],
          cursor: [[350, 270], [800, 270], [1260, 270], [1610, 270]]
        }
      ];

      const qs = (s) => document.querySelector(s);
      const setCaption = (text) => { caption.textContent = text; };
      const hideScenes = () => gsap.set(scenes, { opacity: 0 });
      const resetShared = () => {
        qs("#cursor").style.opacity = 0;
        qs("#click-ring").style.opacity = 0;
      };
      const showClick = (x, y, at) => {
        tl.set("#click-ring", { x, y, scale: 0.7, opacity: 0 }, at)
          .to("#click-ring", { opacity: 0.9, scale: 1.15, duration: 0.16 }, at)
          .to("#click-ring", { opacity: 0, scale: 1.7, duration: 0.32 }, at + 0.16);
      };
      const moveCursor = (points, base, span) => {
        if (!points) return;
        tl.set("#cursor", { opacity: 1, x: points[0][0], y: points[0][1] }, base + 1.0);
        points.forEach((p, i) => {
          tl.to("#cursor", { x: p[0], y: p[1], duration: 0.55, ease: "power2.inOut" }, base + 2 + i * span);
          showClick(p[0] + 16, p[1] + 20, base + 2.62 + i * span);
        });
      };
      const linesHtml = (lines) => lines.map(([text, cls]) => `<span class="line ${cls || ""}">${text}</span>`).join("");
      const enterCaption = (text, at) => {
        tl.to("#caption", { opacity: 1, duration: 0.2, onStart: () => setCaption(text) }, at);
      };
      const exitCaption = (at) => tl.to("#caption", { opacity: 0, duration: 0.2 }, at);

      function renderVscode(s) {
        qs("#tree").innerHTML = `<div class="side-title">${s.tree[0]}</div>` + s.tree.slice(1).map((f, i) => `<div class="file ${i === 0 ? "active" : ""}">${f}</div>`).join("");
        qs("#tabs").innerHTML = s.tabs.map((t, i) => `<div class="tab ${i === 0 ? "active" : ""}">${t}</div>`).join("");
        qs("#editor").innerHTML = linesHtml(s.code);
        qs("#term-title").textContent = "terminal / token stack";
        qs("#terminal-lines").innerHTML = s.term.map((l, i) => `<div class="term-line">${i === 0 ? '<span class="good">$</span> ' : ""}${l}</div>`).join("");
        qs("#meter-label").textContent = s.meter[0];
        qs("#meter-number").textContent = s.meter[1];
        qs("#meter-fill").style.width = `${s.meter[2]}%`;
      }
      function renderCards(s) {
        qs("#cards-title").textContent = s.title;
        qs("#cards-grid").innerHTML = s.cards.map((c) => `<div class="card"><h3>${c[0]}</h3><p>${c[1]}</p><span class="badge">${c[2]}</span></div>`).join("");
      }
      function renderSource(s) {
        qs("#source-url").textContent = s.url;
        qs("#source-body").innerHTML = `<div class="eyebrow">Source Proof</div><div class="headline" style="font-size:54px">${s.title}</div>` + s.rows.map((r) => `<div class="source-row">${r}</div>`).join("");
        qs("#source-title").textContent = s.caption;
        qs("#source-meter-label").textContent = s.meter[0];
        qs("#source-meter-number").textContent = s.meter[1];
        qs("#source-meter-fill").style.width = `${s.meter[2]}%`;
      }
      function renderFlow(s) {
        qs("#flow-left").innerHTML = `<h3>${s.left[0]}</h3>` + s.left.slice(1).map((n) => `<div class="node">${n}</div>`).join("");
        qs("#flow-right").innerHTML = `<h3>${s.right[0]}</h3>` + s.right.slice(1).map((n) => `<div class="node">${n}</div>`).join("");
        qs("#flow-title").textContent = s.title;
        qs("#blob").textContent = s.blob;
      }
      function renderTable(s) {
        qs("#table-title").textContent = s.title;
        qs("#table").innerHTML = s.rows.map((r, i) => `<div class="row ${i === 0 ? "header" : ""}">${r.map((c) => `<div>${c}</div>`).join("")}</div>`).join("");
      }
      function activate(s) {
        hideScenes();
        resetShared();
        if (s.kind === "vscode") { renderVscode(s); gsap.set("#scene-vscode", { opacity: 1 }); }
        if (s.kind === "cards") { renderCards(s); gsap.set("#scene-cards", { opacity: 1 }); }
        if (s.kind === "source") { renderSource(s); gsap.set("#scene-source", { opacity: 1 }); }
        if (s.kind === "flow") { renderFlow(s); gsap.set("#scene-flow", { opacity: 1 }); }
        if (s.kind === "table") { renderTable(s); gsap.set("#scene-table", { opacity: 1 }); }
      }

      gsap.set([...scenes, "#caption", "#cursor", "#click-ring"], { opacity: 0 });
      tl.from("#intro-label", { opacity: 0, y: 28, duration: 0.55, ease: "power3.out" }, 0.4)
        .to("#intro-label", { opacity: 0, y: -22, duration: 0.45, ease: "power2.in" }, 33.6);

      data.forEach((s) => {
        const at = s.t;
        const out = s.t + s.d - 1.2;
        tl.call(() => activate(s), [], at)
          .from(s.kind === "vscode" ? "#scene-vscode .vscode" : `#scene-${s.kind}`, { y: 22, scale: 0.985, duration: 0.4, ease: "power3.out" }, at + 0.05);
        enterCaption(s.caption, at + 0.2);
        if (s.kind === "cards") {
          tl.from("#cards-title", { opacity: 0, y: 24, duration: 0.4 }, at + 6.8);
        }
        if (s.kind === "source") {
          tl.from("#scene-source .source-window", { opacity: 0, y: 26, scale: 0.98, duration: 0.45 }, at + 0.5)
            .from("#source-meter", { opacity: 0, x: 24, duration: 0.35 }, at + 5.0);
        }
        if (s.kind === "flow") {
          tl.from("#scene-flow .lane", { opacity: 0, y: 28, duration: 0.4, stagger: 0.2 }, at + 0.8)
            .set("#blob", { opacity: 1, x: 185, y: 250 }, at + 5.5)
            .to("#blob", { x: 750, y: 335, duration: 1.2, ease: "power2.inOut" }, at + 7.0)
            .to("#blob", { x: 1320, y: 335, duration: 1.2, ease: "power2.inOut" }, at + 10.0)
            .to("#blob", { x: 1320, y: 545, duration: 0.9, ease: "power2.inOut" }, at + 14.0);
        }
        if (s.kind === "table") {
          tl.from("#table-title", { opacity: 0, y: 24, duration: 0.4 }, at + 8.0);
        }
        moveCursor(s.cursor, at, Math.max(5, s.d / 5));
        exitCaption(out);
        tl.to(scenes, { opacity: 0, duration: 0.35 }, out + 0.2);
      });

      tl.to("#caption", { opacity: 1, duration: 0.2, onStart: () => setCaption("Closing summary.") }, 762.5)
        .to("#caption", { opacity: 0, duration: 0.2 }, 802.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
