<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Byrddynasty Component Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="components/byrd-components.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="components/byrd-components.js"></script>
  </head>
  <body>
    <div data-preview-id="component-gallery" data-width="1920" data-height="1080">
      <div id="gallery-content" class="byrd-scene"></div>
    </div>
    <script>
      document.getElementById("gallery-content").innerHTML = window.ByrdComponents.buildComponentGalleryContent();
      window.ByrdComponents.animateComponentGallery().progress(1);
    </script>
  </body>
</html>
