    <script>
      window.__timelines = window.__timelines || {};

      const root = document.getElementById("root");
      const segments = [
        ["002", 60.30, 32.90],
        ["003", 93.20, 54.31],
        ["004", 147.51, 32.26],
        ["005", 179.77, 34.72],
        ["006", 214.49, 21.02],
        ["007", 235.51, 28.06],
        ["008", 263.57, 24.83],
        ["009", 288.40, 24.81],
        ["010", 313.21, 24.23],
      ];

      const tools = [
        ["GitHub", "GH", "#ffb13e"],
        ["Slack", "SL", "#b84dff"],
        ["Sentry", "SE", "#ff6f63"],
        ["Grafana", "GR", "#ffd84d"],
        ["Splunk", "SP", "#ff3d5f"],
        ["Jira", "JI", "#3b8dff"],
      ];

      function clip(tag, cls, start, duration, html) {
        const el = document.createElement(tag);
        el.className = cls;
        el.id = cls.replace(/\s+/g, "-") + "-" + Math.round(start * 100);
        el.dataset.start = start.toFixed(2);
        el.dataset.duration = duration.toFixed(2);
        el.dataset.trackIndex = "2";
        el.innerHTML = html;
        root.appendChild(el);
        return el;
      }
      function lines(n) {
        return `<div class="small-lines">${Array.from({ length: n }, (_, i) => `<span style="width:${48 + ((i * 17) % 44)}%"></span>`).join("")}</div>`;
      }
      function docCards(prefix, count) {
        return Array.from({ length: count }, (_, i) => {
          const x = 160 + (i % 5) * 74;
          const y = 130 + Math.floor(i / 5) * 72;
          return `<div class="doc-card ${prefix}-doc" style="left:${x}px;top:${y}px;width:70px;height:96px;transform:rotate(${(i % 3 - 1) * 4}deg)">${lines(5)}</div>`;
        }).join("");
      }

      function scene002(start, duration) {
        const html = `
          <div class="scene scene-002">
            <div class="title s002-title">System Readiness: Integrations Already Connected</div>
            <div class="subtitle s002-sub">Context is being populated before the actual user task begins</div>
            ${["GitHub", "Grafana", "Splunk"].map((name, i) => `<div class="source-box chip s002-left" style="left:70px;top:${220 + i * 305}px"><div class="name">${name}</div>${docCards("l" + i, 6)}</div>`).join("")}
            ${["Sentry", "Splunk", "Jira"].map((name, i) => `<div class="source-box chip red s002-right ${i === 2 ? "blue" : ""}" style="right:70px;top:${220 + i * 305}px"><div class="name">${name}</div>${docCards("r" + i, 6)}</div>`).join("")}
            <div class="context-window window bar-dots s002-context">
              <div class="big-label accent-cyan" style="text-align:center;margin-bottom:28px">Central AI Context Window</div>
              <div class="label" style="text-align:center">Integrated context</div>
              ${docCards("ctx", 13)}
            </div>
            <div class="prompt chip s002-prompt">Empty user prompt</div>
            <div class="stream s002-stream" style="left:342px;top:400px;width:360px;transform:rotate(22deg)"></div>
            <div class="stream s002-stream" style="left:342px;top:630px;width:360px"></div>
            <div class="stream s002-stream" style="left:342px;top:895px;width:390px;transform:rotate(-35deg)"></div>
            <div class="stream s002-stream" style="right:342px;top:400px;width:360px;transform:rotate(158deg)"></div>
            <div class="stream s002-stream" style="right:342px;top:630px;width:360px;transform:rotate(180deg)"></div>
            <div class="stream s002-stream" style="right:342px;top:895px;width:390px;transform:rotate(215deg)"></div>
            <div class="flow-label s002-flow" style="left:385px;top:375px">Commit data, PRs, messages</div>
            <div class="flow-label s002-flow" style="left:405px;top:670px">Metrics, logs, events</div>
            <div class="flow-label s002-flow" style="right:360px;top:375px;transform:rotate(-23deg)">Errors, issues, tickets</div>
            <div class="metric s002-status" style="left:520px;bottom:14px;width:880px;text-align:center;font-size:58px">Status: Task Has Not Started Yet</div>
          </div>`;
        clip("div", "scene-wrap scene-002-wrap", start, duration * 0.50, html);
        const html2 = `
          <div class="scene scene-002b">
            <div class="frame s002b-frame"></div>
            <div class="title s002b-title">Context Memory Before the Task</div>
            <div class="metric s002b-total" style="left:650px;top:165px">Current Total: 55,000 Tokens</div>
            <div class="side-panel chip s002b-left" style="left:65px;top:135px"><div class="label">Integration Status:</div><div class="big-label accent-green">All Active</div></div>
            <div class="side-panel chip s002b-left" style="left:65px;top:280px"><div class="label">Pre-Task Data:</div><div class="big-label accent-green">Populated</div></div>
            <div class="side-panel chip s002b-left" style="left:65px;top:780px"><div class="label">Context State:</div><div class="big-label accent-amber">Loaded</div></div>
            <div class="side-panel chip s002b-right" style="right:65px;top:135px"><div class="label">Problem Space:</div><div class="big-label">Uninitialized</div></div>
            <div class="side-panel chip s002b-right" style="right:65px;top:660px"><div class="label">Actual Problem:</div><div class="big-label accent-red">Not loaded yet</div></div>
            <div class="stack-axis s002b-axis"></div>
            ${tools.map((t, i) => `<div class="def-bar s002b-bar" style="top:${310 + i * 118}px;border-color:${t[2]};box-shadow:0 0 25px ${t[2]}77;background:linear-gradient(90deg,${t[2]}44,rgba(16,24,38,.88))"><div class="icon">${t[1]}</div><div class="text">${t[0]} tool definitions</div><div class="pct">${[5.2, 12.2, 9.4, 3.7, 1.0, .7][i]}% / 55K</div></div>`).join("")}
          </div>`;
        clip("div", "scene-wrap scene-002b-wrap", start + duration * 0.50, duration * 0.50, html2);
      }

      function scene003(start, duration) {
        const toolHtml = ["Jira Task", "Sentry Error", "AWS Metrics", "Repo PR", "Slack Thread", "Docs Search", "Deploy Log", "Auth Trace", "Billing Event", "CRM Record", "Calendar", "Archive"].map((name, i) => {
          const x = 35 + (i % 4) * 150;
          const y = 70 + Math.floor(i / 4) * 165;
          const match = i < 3 ? "match" : "";
          return `<div class="tool-card s003-tool ${match}" style="left:${x}px;top:${y}px"><div style="font-size:28px;font-weight:950">${name.slice(0,2).toUpperCase()}</div><div style="font-size:18px;font-weight:850">${name}</div></div>`;
        }).join("");
