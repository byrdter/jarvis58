# Filtering preferences
filters:
  min_duration_seconds: 120
  max_duration_seconds: 7200
  exclude_keywords:
    - "LIVE"
    - "livestream"
  priority_keywords:
    - "Claude"
    - "GPT-4"
    - "GPT-5"
    - "Gemini"
    - "agents"
    - "agentic"
    - "MCP"
    - "breaking"
    - "new model"
    - "announced"

# Report / corpus preferences
report:
  # Default per-channel ingest cap (override per channel via daily_cap on the entry)
  max_videos_per_channel: 5
  # Cap any single channel in the EMAIL DIGEST (corpus still gets all)
  digest_max_per_channel: 3
  # Cap total videos in the email digest
  max_total_videos: 40
  sort_by: "engagement"
  include_stats: true
  include_description: true
  description_chars: 350
