# Filtering preferences
filters:
  min_duration_seconds: 120  # Skip shorts under 2 minutes
  max_duration_seconds: 7200  # Skip videos over 2 hours (likely streams)
  exclude_keywords:
    - "LIVE"
    - "livestream"
    - "podcast" # Optional: remove if you want podcasts
  priority_keywords:
    - "Claude"
    - "GPT-4"
    - "Gemini"
    - "agents"
    - "agentic"
    - "breaking"
    - "new model"
    - "announced"

# Report preferences
report:
  max_videos_per_channel: 3
  max_total_videos: 20
  sort_by: "engagement"  # Options: engagement, views, recency
  include_stats: true
  include_description: true
